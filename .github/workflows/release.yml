name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      attestations: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: bybit-linux-x64
            binary: bybit
            subject_path: bybit-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: bybit-macos-arm64
            binary: bybit
            subject_path: bybit-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: bybit-windows-x64
            binary: bybit.exe
            subject_path: bybit-windows-x64.exe

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --locked --profile dist --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/dist/${{ matrix.binary }} ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.target }}\dist\${{ matrix.binary }} ${{ matrix.artifact }}.exe

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ matrix.subject_path }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.subject_path }}

  sign:
    name: Sign And Checksum
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Install minisign
        env:
          MINISIGN_VERSION: "0.11"
          MINISIGN_SHA256: "f0a0954413df8531befed169e447a66da6868d79052ed7e892e50a4291af7ae0"
        run: |
          curl -sSL -o /tmp/minisign.tar.gz \
            "https://github.com/jedisct1/minisign/releases/download/${MINISIGN_VERSION}/minisign-${MINISIGN_VERSION}-linux.tar.gz"
          echo "${MINISIGN_SHA256}  /tmp/minisign.tar.gz" | sha256sum -c -
          tar xzf /tmp/minisign.tar.gz -C /tmp
          sudo mv /tmp/minisign-linux/x86_64/minisign /usr/local/bin/
          rm -rf /tmp/minisign.tar.gz /tmp/minisign-linux
          minisign -v

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Sign release artifacts and generate checksums
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        shell: bash
        run: |
          if [ -z "$MINISIGN_SECRET_KEY" ]; then
            echo "::error::MINISIGN_SECRET_KEY is not set. Refusing to publish unsigned artifacts."
            exit 1
          fi

          echo "$MINISIGN_SECRET_KEY" > /tmp/minisign.key
          trap 'rm -f /tmp/minisign.key' EXIT
          export MINISIGN_PASSWORD="${MINISIGN_PASSWORD:-}"

          cd dist

          mapfile -t FILES < <(find . -maxdepth 1 -type f \
            ! -name '*.minisig' \
            ! -name 'SHA256SUMS.txt' \
            ! -name 'SHA256SUMS.txt.minisig' \
            -printf '%f\n' | sort)

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "::error::No release artifacts found to sign."
            exit 1
          fi

          for file in "${FILES[@]}"; do
            printf '%s\n' "$MINISIGN_PASSWORD" | minisign -Sm "$file" -s /tmp/minisign.key -t "bybit-cli release artifact"
          done

          sha256sum "${FILES[@]}" > SHA256SUMS.txt
          printf '%s\n' "$MINISIGN_PASSWORD" | minisign -Sm SHA256SUMS.txt -s /tmp/minisign.key -t "bybit-cli release checksums"

          ls -la

      - name: Upload signatures and checksums
        uses: actions/upload-artifact@v4
        with:
          name: release-signatures
          path: |
            dist/*.minisig
            dist/SHA256SUMS.txt
            dist/SHA256SUMS.txt.minisig

  release:
    name: Create GitHub Release
    needs:
      - build
      - sign
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: find dist/ -maxdepth 1 -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bybit-linux-x64
            dist/bybit-macos-arm64
            dist/bybit-windows-x64.exe
            dist/*.minisig
            dist/SHA256SUMS.txt
            dist/SHA256SUMS.txt.minisig
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
